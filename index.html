<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Advanced attendance tracking and analytics platform with modern UI/UX" />
    <meta name="keywords" content="attendance, analytics, education, student management" />
    <meta name="author" content="Attendance Intelligence Platform" />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts - Inter & JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Theme Color Meta -->
    <meta name="theme-color" content="#667eea" />
    <meta name="msapplication-TileColor" content="#667eea" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Prevent FOUC (Flash of Unstyled Content) -->
    <script>
      // Prevent flash of unstyled content
      (function() {
        const html = document.documentElement;
        html.classList.add('theme-loading');
        
        // Remove loading class when styles are loaded
        window.addEventListener('load', function() {
          html.classList.remove('theme-loading');
          html.classList.add('theme-loaded');
        });
      })();
    </script>
    
    <title>Attendance Intelligence Platform - Modern Analytics Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Loading Screen -->
    <div id="initial-loader" className="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-purple-50 to-pink-50 dark:from-gray-900 dark:to-purple-900">
      <div className="text-center">
        <div className="w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center mb-4 shadow-lg animate-pulse">
          <span className="text-white font-bold text-xl">AI</span>
        </div>
        <p className="text-gray-600 dark:text-gray-400 font-medium">Loading Dashboard...</p>
      </div>
    </div>
    
    <script>
      // Hide loader when app is ready
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 300);
        }
      });
    </script>
  </body>
</html>
